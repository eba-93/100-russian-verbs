    function playAudio(verbId) {
        const audio = new Audio(`${verbId}.mp3`);
        audio.play().catch(e => {
            const verb = verbs.find(v => v.id === verbId);
            if (!verb) return;
            const utterance = new SpeechSynthesisUtterance(verb.raw);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        });
    }

    function showFeedback(msg, type = "success") {
        const fb = document.getElementById('feedback');
        fb.textContent = msg;
        fb.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl text-white font-bold shadow-2xl transition-all z-50 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
        fb.style.opacity = "1";
        setTimeout(() => fb.style.opacity = "0", 2500);
    }

    function render() {
        const container = document.getElementById('content');
        container.innerHTML = '';
        if (currentTab === 'dict') renderDictionary(container);
        else if (currentTab === 'favorites') renderFavorites(container);
        else if (currentTab === 'conjugation') renderConjugation(container);
        else if (currentTab === 'practice') {
            if (!gameMode) renderPracticeMenu(container);
            else if (gameMode === 'quiz') renderQuiz(container);
            else if (gameMode === 'write') renderWrite(container);
            else if (gameMode === 'listen') renderListen(container);
            else if (gameMode === 'scrambled') renderScrambled(container);
        }
    }

    function renderDictionary(el) {
        const searchDiv = document.createElement('div');
        searchDiv.className = 'max-w-2xl mx-auto mb-12';
        searchDiv.innerHTML = `
            <div class="relative">
                <input type="text" id="searchInput" value="${searchQuery}" placeholder="Хайх үгээ бичнэ үү..." 
                    class="w-full p-5 pl-14 rounded-2xl glass font-bold text-slate-700 outline-none shadow-xl border-2 border-slate-100 transition-all"
                    oninput="handleSearch(this.value)">
                <svg class="w-6 h-6 absolute left-5 top-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        `;
        el.appendChild(searchDiv);

        const filteredVerbs = verbs.filter(v => 
            v.pair.toLowerCase().includes(searchQuery.toLowerCase()) || 
            v.mn.toLowerCase().includes(searchQuery.toLowerCase())
        );

        const itemsPerPage = 10;
        const start = (currentPage - 1) * itemsPerPage;
        const currentVerbs = filteredVerbs.slice(start, start + itemsPerPage);

        const list = document.createElement('div');
        list.className = 'grid grid-cols-1 md:grid-cols-2 gap-5 mb-10';
        currentVerbs.forEach(v => {
            const isLearned = learnedIds.has(v.id);
            list.innerHTML += `
                <div class="verb-card glass p-6 rounded-2xl flex justify-between items-center ${isLearned ? 'border-l-green-500' : ''}">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[9px] text-slate-400 font-black bg-slate-100 px-1.5 py-0.5 rounded">№${v.id}</span>
                            <div class="text-blue-900 font-black text-xl">${v.pair}</div>
                        </div>
                        <div class="text-slate-600 font-bold text-base">${v.mn}</div>
                        <span class="text-[10px] font-black text-red-500 italic uppercase mt-1 block">${v.upr}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="playAudio(${v.id})" class="p-3.5 rounded-xl bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"></path></svg>
                        </button>
                        <button onclick="toggleLearned(${v.id})" class="p-3.5 rounded-xl ${isLearned ? 'bg-green-500 text-white shadow-green-200' : 'bg-slate-100 text-slate-300'} transition-all shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </button>
                    </div>
                </div>
            `;
        });
        el.appendChild(list);

        if (filteredVerbs.length > itemsPerPage) {
            const totalPages = Math.ceil(filteredVerbs.length / itemsPerPage);
            const pagination = document.createElement('div');
            pagination.className = 'flex flex-wrap justify-center gap-2 mt-10';
            for (let i = 1; i <= totalPages; i++) {
                pagination.innerHTML += `<button onclick="changePage(${i})" class="w-11 h-11 rounded-xl glass text-sm font-black ${currentPage === i ? 'bg-blue-900 text-white' : 'text-slate-600 hover:bg-blue-50'} transition-all">${i}</button>`;
            }
            el.appendChild(pagination);
        }
    }

    function renderConjugation(el) {
        el.innerHTML = `
            <div class="max-w-3xl mx-auto mb-12">
                <div class="glass p-10 rounded-[2.5rem] shadow-2xl border-t-8 border-blue-900">
                    <h2 class="text-2xl font-black text-slate-800 mb-2">🔄 Спряжение (Хувиргах)</h2>
                    <p class="text-slate-500 text-sm mb-8 font-bold">Орос үйл үгийг бүх цаг дээр хувиргаж үзээрэй</p>
                    <div class="flex gap-3 mb-10">
                        <input type="text" id="conjInput" placeholder="Жишээ: Работать..." class="flex-1 p-5 rounded-2xl border-2 border-slate-100 focus:border-blue-900 outline-none font-bold text-slate-700 shadow-inner">
                        <button onclick="handleConjugate()" class="px-10 py-5 bg-blue-900 text-white rounded-2xl font-black hover:bg-black transition-all shadow-xl active:scale-95 uppercase text-xs tracking-widest">Хувиргах</button>
                    </div>
                    <div id="conjLoading" class="hidden text-center py-12"><div class="animate-spin w-10 h-10 border-4 border-blue-900 border-t-transparent rounded-full mx-auto mb-3"></div><p class="text-blue-900 font-bold text-xs uppercase">Хувиргаж байна...</p></div>
                    <div id="conjResult" class="space-y-8"></div>
                </div>
            </div>
        `;
    }

    async function handleConjugate() {
        const val = document.getElementById('conjInput').value.trim();
        if(!val) return;
        const result = document.getElementById('conjResult');
        const loading = document.getElementById('conjLoading');
        loading.classList.remove('hidden');
        result.innerHTML = '';
        
        const prompt = `Conjugate the Russian verb "${val}" in all forms (Present, Past, Future, Imperative). Include its infinitive meaning in Mongolian. Format: JSON.`;
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            const rawData = await response.json();
            const data = JSON.parse(rawData.candidates[0].content.parts[0].text);
            
            loading.classList.add('hidden');
            result.innerHTML = `
                <div class="bg-blue-50 p-6 rounded-2xl border-l-8 border-blue-900 shadow-sm">
                    <div class="text-3xl font-black text-slate-800 mb-1">${val} <span class="text-red-500 text-xl font-bold">${data.upr || ''}</span></div>
                    <div class="text-slate-600 font-bold text-lg">${data.translation || 'Орчуулга'}</div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    ${createConjBox('Настоящее время (Одоо)', data.present || {}, 'blue')}
                    ${createConjBox('Прошедшее время (Өнгөрсөн)', data.past || {}, 'green')}
                    ${createConjBox('Будущее время (Ирээдүй)', data.future || {}, 'purple')}
                    ${createConjBox('Повелительное (Захирах)', data.imperative || {}, 'orange')}
                </div>
            `;
        } catch (e) {
            loading.classList.add('hidden');
            showFeedback("Алдаа гарлаа. Дахин оролдоно уу.", "error");
        }
    }

    function createConjBox(title, forms, color) {
        return `
            <div class="p-6 rounded-2xl bg-${color}-50/50 border border-${color}-100">
                <h4 class="text-[11px] font-black text-${color}-700 mb-4 uppercase tracking-tighter">${title}</h4>
                <table class="w-full conjugation-table">
                    ${Object.entries(forms).map(([k, v]) => `<tr><th class="w-20">${k}</th><td>${v}</td></tr>`).join('')}
                </table>
            </div>
        `;
    }

    function renderPracticeMenu(el) {
        const modes = [
            { id: 'quiz', icon: '📝', title: 'Орчуулга сонгох', desc: 'Зөв монгол орчуулгыг нь сонгоно уу' },
            { id: 'write', icon: '⌨️', title: 'Үг орчуулах', desc: 'Монгол үгийг оросоор бичиж хариулна уу' },
            { id: 'listen', icon: '🎧', title: 'Сонсох ба Бичих', desc: 'Дуудлагыг сонсоод орос үгийг бичнэ үү' },
            { id: 'scrambled', icon: '🧩', title: 'Холимог үсэг', desc: 'Холилдсон үсгүүдийг зөв дараалалд оруулна уу' }
        ];
        el.innerHTML = `
            <div class="max-w-4xl mx-auto">
                <h2 class="text-2xl font-black text-slate-800 mb-8 text-center uppercase tracking-widest">Дасгал ажилаа сонгоно уу</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    ${modes.map(m => `
                        <div onclick="startPractice('${m.id}')" class="glass p-10 rounded-[2.5rem] text-center cursor-pointer hover:shadow-2xl hover:-translate-y-2 transition-all border-b-8 border-blue-600 group">
                            <div class="text-6xl mb-5 group-hover:scale-110 transition-transform">${m.icon}</div>
                            <h3 class="font-black text-xl text-slate-800 mb-3">${m.title}</h3>
                            <p class="text-slate-500 text-sm font-bold leading-relaxed px-4">${m.desc}</p>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    function startPractice(mode) {
        gameMode = mode;
        gameState = { score: 0, index: 0, shuffled: [...verbs].sort(() => Math.random() - 0.5).slice(0, 10), wrongCount: 0 };
        render();
    }

    function renderQuiz(el) {
        const item = gameState.shuffled[gameState.index];
        const options = [item.mn];
        while(options.length < 4) {
            const rand = verbs[Math.floor(Math.random() * verbs.length)].mn;
            if(!options.includes(rand)) options.push(rand);
        }
        options.sort(() => Math.random() - 0.5);
        el.innerHTML = `
            <div class="max-w-xl mx-auto game-card">
                <div class="glass p-12 rounded-[3rem] shadow-2xl relative">
                    <div class="flex justify-between items-center mb-12">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Дасгал ${gameState.index + 1} / 10</span>
                        <span class="bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full font-black text-xs">ОНОО: ${gameState.score}</span>
                    </div>
                    <div class="text-center mb-12">
                        <div class="text-4xl font-black text-blue-900 mb-3">${item.raw}</div>
                        <button onclick="playAudio(${item.id})" class="text-blue-500 hover:text-blue-700 font-bold text-xs uppercase flex items-center justify-center gap-1 mx-auto">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"></path></svg>
                            Дуудлага
                        </button>
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        ${options.map(opt => `<button onclick="checkQuiz('${opt.replace(/'/g, "\\'")}')" class="p-5 rounded-2xl border-2 border-slate-100 hover:border-blue-900 hover:bg-blue-50 font-bold text-slate-700 transition-all text-sm shadow-sm">${opt}</button>`).join('')}
                    </div>
                </div>
            </div>
        `;
    }

    function checkQuiz(ans) {
        const item = gameState.shuffled[gameState.index];
        if(ans === item.mn) { gameState.score += 10; showFeedback("ЗӨВ! +10 Оноо", "success"); }
        else { showFeedback(`БУРУУ! Зөв нь: ${item.mn}`, "error"); }
        nextQuestion();
    }

    // ШИНЭ: Үг орчуулах (Гараар бичих)
    function renderWrite(el) {
        const item = gameState.shuffled[gameState.index];
        el.innerHTML = `
            <div class="max-w-2xl mx-auto game-card">
                <div class="glass p-12 rounded-[3rem] shadow-2xl text-center">
                    <div class="flex justify-between items-center mb-12">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Орчуулга ${gameState.index + 1}/10</span>
                        <div class="flex gap-1">${Array(3 - gameState.wrongCount).fill('❤️').join('')}</div>
                    </div>
                    <div class="text-xl font-bold text-slate-500 mb-4 uppercase tracking-tighter">Оросоор юу гэх вэ?</div>
                    <div class="text-4xl font-black text-blue-900 mb-12">"${item.mn}"</div>
                    
                    <div class="mb-10">
                        <input type="text" id="writeInput" placeholder="Орос үгийг бичнэ үү..." 
                            class="w-full p-6 rounded-2xl border-4 border-slate-100 focus:border-blue-900 outline-none font-black text-center text-2xl text-slate-800 transition-all shadow-inner"
                            autocomplete="off"
                            onkeypress="if(event.key === 'Enter') checkWrite()">
                    </div>
                    
                    <button onclick="checkWrite()" class="w-full py-6 bg-blue-900 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-black transition-all active:scale-95">Шалгах</button>
                    <p class="mt-6 text-slate-400 text-[10px] font-bold uppercase tracking-widest">Enter товч дарж шалгаж болно</p>
                </div>
            </div>
        `;
        setTimeout(() => document.getElementById('writeInput').focus(), 100);
    }

    function checkWrite() {
        const input = document.getElementById('writeInput').value.trim().toLowerCase();
        const item = gameState.shuffled[gameState.index];
        const correct = item.raw.toLowerCase().replace(/́/g, ''); // Өргөлтийг арилгаж шалгах
        
        if(input === correct) { 
            gameState.score += 25; 
            showFeedback("МАШ САЙН! +25 Оноо", "success");
            nextQuestion();
        } else { 
            gameState.wrongCount++;
            document.querySelector('.glass').classList.add('shake');
            setTimeout(() => document.querySelector('.glass').classList.remove('shake'), 400);
            
            if(gameState.wrongCount >= 3) {
                showFeedback(`АЛДЛАА! Зөв үг: ${item.raw}`, "error");
                gameState.wrongCount = 0;
                nextQuestion();
            } else {
                showFeedback("Буруу байна, дахин оролдоорой!", "error");
            }
        }
    }

    function renderListen(el) {
        const item = gameState.shuffled[gameState.index];
        el.innerHTML = `
            <div class="max-w-xl mx-auto game-card">
                <div class="glass p-12 rounded-[3rem] shadow-2xl text-center">
                    <div class="mb-12">
                        <button onclick="playAudio(${item.id})" class="w-28 h-28 rounded-full bg-blue-900 text-white flex items-center justify-center mx-auto shadow-2xl hover:scale-110 transition-transform active:scale-95">
                            <svg class="w-12 h-12" fill="currentColor" viewBox="0 0 20 20"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"></path></svg>
                        </button>
                        <p class="mt-6 text-slate-400 font-black uppercase text-[10px] tracking-widest">Дууг сонсоод орос үгийг бичнэ үү</p>
                    </div>
                    <div class="mb-10">
                        <input type="text" id="listenInput" placeholder="Бичих..." 
                            class="w-full p-6 rounded-2xl border-4 border-slate-100 focus:border-blue-900 outline-none font-black text-center text-2xl text-slate-800 transition-all shadow-inner"
                            onkeypress="if(event.key === 'Enter') checkListen()">
                    </div>
                    <button onclick="checkListen()" class="w-full py-6 bg-blue-900 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl">Шалгах</button>
                </div>
            </div>
        `;
        setTimeout(() => playAudio(item.id), 500);
        setTimeout(() => document.getElementById('listenInput').focus(), 600);
    }

    function checkListen() {
        const input = document.getElementById('listenInput').value.trim().toLowerCase();
        const item = gameState.shuffled[gameState.index];
        const correct = item.raw.toLowerCase().replace(/́/g, '');
        if(input === correct) { gameState.score += 30; showFeedback("ГАЙХАЛТАЙ! +30 Оноо", "success"); }
        else { showFeedback(`БУРУУ! Зөв нь: ${item.raw}`, "error"); }
        nextQuestion();
    }

    function renderScrambled(el) {
        const item = gameState.shuffled[gameState.index];
        const word = item.raw.toLowerCase().replace(/́/g, '');
        if(!gameState.scrambled) { 
            gameState.scrambled = word.split('').sort(() => Math.random() - 0.5); 
            gameState.userWord = []; 
        }
        el.innerHTML = `
            <div class="max-w-2xl mx-auto game-card">
                <div class="glass p-12 rounded-[3rem] shadow-2xl text-center">
                    <div class="text-xl font-bold text-slate-500 mb-10 italic">"${item.mn}"</div>
                    <div class="flex flex-wrap justify-center gap-3 mb-12 min-h-[70px] border-b-4 border-slate-100 pb-6">
                        ${gameState.userWord.map((l, i) => `<button onclick="removeFromScramble(${i})" class="w-14 h-16 rounded-2xl bg-blue-900 text-white font-black text-2xl shadow-xl animate-in zoom-in">${l}</button>`).join('')}
                    </div>
                    <div class="flex flex-wrap justify-center gap-3">
                        ${gameState.scrambled.map((l, i) => `<button onclick="addToScramble(${i})" class="w-14 h-16 rounded-2xl bg-white border-2 border-slate-200 text-slate-700 font-black text-2xl hover:border-blue-900 hover:shadow-lg transition-all">${l}</button>`).join('')}
                    </div>
                    <div class="mt-12 flex gap-3">
                        <button onclick="checkScramble()" class="flex-1 py-5 bg-green-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg">Шалгах</button>
                        <button onclick="resetScramble()" class="px-8 py-5 bg-slate-100 text-slate-400 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-slate-200">Арилгах</button>
                    </div>
                </div>
            </div>
        `;
    }

    function addToScramble(i) {
        const letter = gameState.scrambled.splice(i, 1)[0];
        gameState.userWord.push(letter);
        render();
    }

    function removeFromScramble(i) {
        const letter = gameState.userWord.splice(i, 1)[0];
        gameState.scrambled.push(letter);
        render();
    }

    function resetScramble() { gameState.scrambled = null; render(); }

    function checkScramble() {
        const item = gameState.shuffled[gameState.index];
        const correct = item.raw.toLowerCase().replace(/́/g, '');
        const current = gameState.userWord.join('');
        if(current === correct) { 
            gameState.score += 25; 
            showFeedback("ЗӨВ БАЙНА! +25 Оноо", "success"); 
            gameState.scrambled = null; 
            nextQuestion(); 
        } else { 
            showFeedback("Буруу дараалал байна!", "error"); 
            document.querySelector('.game-card').classList.add('shake'); 
            setTimeout(() => document.querySelector('.game-card').classList.remove('shake'), 400); 
        }
    }

    function nextQuestion() {
        gameState.index++;
        if(gameState.index >= 10) { renderGameOver(); }
        else { 
            gameState.scrambled = null; 
            gameState.guesses = null; 
            gameState.wrongCount = 0;
            setTimeout(render, 1500); 
        }
    }

    function renderGameOver() {
        const el = document.getElementById('content');
        el.innerHTML = `
            <div class="max-w-xl mx-auto text-center game-card">
                <div class="glass p-16 rounded-[4rem] shadow-2xl">
                    <div class="text-8xl mb-8 animate-bounce">🏆</div>
                    <h2 class="text-4xl font-black text-slate-800 mb-3">Браво!</h2>
                    <p class="text-slate-500 font-bold text-lg mb-10">Таны нийт оноо: <span class="text-blue-900 text-4xl block mt-2">${gameState.score}</span></p>
                    <button onclick="setTab('practice')" class="w-full py-6 bg-blue-900 text-white rounded-[2rem] font-black uppercase tracking-widest hover:bg-black transition-all shadow-2xl active:scale-95">Дахин эхлэх</button>
                </div>
            </div>
        `;
    }

    function renderFavorites(el) {
        const favoriteVerbs = verbs.filter(v => learnedIds.has(v.id));
        if(favoriteVerbs.length === 0) { 
            el.innerHTML = `
                <div class="text-center py-24 glass rounded-[3rem] max-w-2xl mx-auto">
                    <div class="text-7xl mb-6 text-slate-200">⭐</div>
                    <h3 class="text-2xl font-black text-slate-800 mb-3">Цээжилсэн үг байхгүй байна</h3>
                    <p class="text-slate-400 font-bold">Үгийн жагсаалт руу орж цээжилсэн үгээ тэмдэглээрэй</p>
                </div>
            `; 
            return; 
        }
        el.innerHTML = `
            <div class="max-w-2xl mx-auto mb-10">
                <h2 class="text-2xl font-black text-slate-800 flex items-center gap-3">
                    <span class="text-yellow-400 text-3xl">⭐</span> Миний цээжилсэн үгс (${favoriteVerbs.length})
                </h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                ${favoriteVerbs.map(v => `
                    <div class="verb-card glass p-6 rounded-2xl flex justify-between items-center border-l-green-500">
                        <div>
                            <div class="text-blue-900 font-black text-xl">${v.pair}</div>
                            <div class="text-slate-600 font-bold text-sm mt-1">${v.mn}</div>
                        </div>
                        <button onclick="toggleLearned(${v.id})" class="p-4 rounded-2xl bg-green-500 text-white shadow-lg shadow-green-100 transition-all active:scale-90">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </button>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function handleSearch(val) { searchQuery = val; currentPage = 1; render(); document.getElementById('searchInput').focus(); }
    function changePage(p) { currentPage = p; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

    window.onload = () => { setTab('dict'); };
