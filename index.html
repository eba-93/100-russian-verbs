        :root { 
            --ru-blue: #0039A6; 
            --ru-red: #D52B1E; 
        }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            /* Арын фон зургийг SB-1.png болгож солив */
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), 
                        url('./SB-1.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            background-color: #f8fafc; /* Зураг ачаалагдахгүй үеийн нөөц өнгө */
        }

        .glass { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(255,255,255,0.4); 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .nav-btn.active { 
            background: var(--ru-blue); 
            color: white; 
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 57, 166, 0.3);
        }

        .verb-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border-left: 4px solid var(--ru-blue); 
        }

        .verb-card:hover { 
            transform: scale(1.02); 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
        }

        .school-font { font-family: 'Oswald', sans-serif; letter-spacing: 0.03em; }
        
        .letter-slot { 
            width: 3rem; 
            height: 3.5rem; 
            border-bottom: 3px solid #cbd5e1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.5rem; 
            font-weight: 900; 
            color: #1e293b; 
            margin: 0 0.25rem; 
        }

        .letter-slot.correct { border-bottom-color: #22c55e; color: #15803d; }
        
        .logo-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 1.5rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .school-logo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>

</div>

    function playAudio(verbId) {
        const audio = new Audio(`./${verbId}.mp3`);
        audio.play().catch(err => {
            console.error(`${verbId}.mp3 файл олдсонгүй`);
            showFeedback(`${verbId}.mp3 олдсонгүй`, "error");
        });
    }

    function setTab(tab) {
        currentTab = tab;
        gameMode = null;
        currentPage = 1;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const activeTab = document.getElementById(`tab-${tab}`);
        if(activeTab) activeTab.classList.add('active');
        render();
    }

    function toggleLearned(id) {
        if (learnedIds.has(id)) learnedIds.delete(id);
        else learnedIds.add(id);
        localStorage.setItem('learnedVerbs', JSON.stringify([...learnedIds]));
        render();
    }

    function render() {
        const container = document.getElementById('content');
        container.innerHTML = '';
        
        if (currentTab === 'dict') renderDictionary(container);
        else if (currentTab === 'favorites') renderFavorites(container);
        else if (currentTab === 'practice') {
            if (!gameMode) renderPracticeMenu(container);
            else if (gameMode === 'quiz') renderQuiz(container);
            else if (gameMode === 'miner') renderMiner(container);
            else if (gameMode === 'listen') renderListen(container);
            else if (gameMode === 'scrambled') renderScrambled(container);
        }
    }

    function renderDictionary(el) {

        const currentVerbs = verbs.slice(start, end);

                        </div>
                        <div class="text-slate-600 font-medium text-sm mt-1">${v.mn}</div>
                    </div>
                    <div class="flex gap-2">

                        </button>
                        <button onclick="toggleLearned(${v.id})" class="p-3 rounded-xl ${isLearned ? 'bg-green-500 text-white shadow-md' : 'bg-slate-100 text-slate-300 hover:text-green-500'} transition-all">

                        </button>
                    </div>
                </div>
            `;
        });
        el.appendChild(list);

        const pagination = document.createElement('div');
        pagination.className = 'flex flex-wrap justify-center items-center gap-2 mt-10';
        for (let i = 1; i <= 10; i++) {
            pagination.innerHTML += `

            `;
        }
        el.appendChild(pagination);
    }

    function changePage(p) {
        currentPage = p;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderPracticeMenu(el) {
        el.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
                <div onclick="startPractice('quiz')" class="glass p-10 rounded-3xl text-center cursor-pointer hover:shadow-2xl transition-all border-b-4 border-blue-600 group">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">📝</div>
                    <h3 class="font-bold text-xl text-slate-800">Сонгох тест</h3>
                    <p class="text-slate-500 text-sm mt-3 leading-relaxed">Орос үгэнд тохирох монгол орчуулгыг зөв сонгоорой.</p>
                </div>
                <div onclick="startPractice('miner')" class="glass p-10 rounded-3xl text-center cursor-pointer hover:shadow-2xl transition-all border-b-4 border-emerald-600 group">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">⛏️</div>
                    <h3 class="font-bold text-xl text-slate-800">Үг олборлогч</h3>
                    <p class="text-slate-500 text-sm mt-3 leading-relaxed">Орчуулгыг харж орос үгийн үсгийг тааж бөглөөрэй.</p>
                </div>
                <div onclick="startPractice('listen')" class="glass p-10 rounded-3xl text-center cursor-pointer hover:shadow-2xl transition-all border-b-4 border-purple-500 group">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">🎧</div>
                    <h3 class="font-bold text-xl text-slate-800">Сонсох ба Бичих</h3>
                    <p class="text-slate-500 text-sm mt-3 leading-relaxed">Дуудлагыг сонсоод зөв бичиж дадлагажаарай.</p>
                </div>
                <div onclick="startPractice('scrambled')" class="glass p-10 rounded-3xl text-center cursor-pointer hover:shadow-2xl transition-all border-b-4 border-red-500 group">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">⌨️</div>
                    <h3 class="font-bold text-xl text-slate-800">Үг бүтээх</h3>
                    <p class="text-slate-500 text-sm mt-3 leading-relaxed">Холилдсон үсгүүдийг зөв байранд нь тавьж үг бүтээ.</p>
                </div>
            </div>
        `;
    }

    function startPractice(mode) {
        gameMode = mode;
        gameState = {
            score: 0,
            index: 0,
            shuffled: [...verbs].sort(() => Math.random() - 0.5).slice(0, 10)
        };
        render();
    }

    function renderQuiz(el) {
        const item = gameState.shuffled[gameState.index];
        const options = [item.mn];
        while(options.length < 4) {
            const randomMn = verbs[Math.floor(Math.random() * verbs.length)].mn;
            if(!options.includes(randomMn)) options.push(randomMn);
        }
        options.sort(() => Math.random() - 0.5);

        el.innerHTML = `
            <div class="max-w-xl mx-auto glass p-10 rounded-3xl shadow-2xl relative overflow-hidden">
                <div class="flex justify-between items-center mb-8">
                    <span class="bg-blue-100 text-blue-800 px-4 py-1.5 rounded-full font-bold text-xs uppercase tracking-tighter">${gameState.index + 1} / 10 дасгал</span>
                    <span class="bg-green-100 text-green-800 px-4 py-1.5 rounded-full font-bold text-xs">Оноо: ${gameState.score}</span>
                </div>
                <div class="flex justify-center mb-8">
                    <button onclick="playAudio(${item.id})" class="p-5 bg-blue-700 text-white rounded-full hover:bg-blue-800 transition-all shadow-lg transform hover:scale-105 active:scale-95">
                        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"></path></svg>
                    </button>
                </div>
                <h2 class="text-4xl font-black text-center text-slate-800 mb-10 tracking-tight leading-tight">${item.pair}</h2>
                <div class="grid gap-3">
                    ${options.map(opt => `
                        <button onclick="checkQuiz('${opt.replace(/'/g, "\\'")}')" class="w-full py-5 px-6 glass rounded-2xl font-bold text-slate-700 hover:bg-blue-900 hover:text-white transition-all text-lg shadow-sm border border-slate-100">
                            ${opt}
                        </button>
                    `).join('')}
                </div>
                <button onclick="setTab('practice')" class="mt-10 text-slate-400 font-bold w-full text-center hover:text-red-500 transition-colors uppercase text-xs tracking-widest">Дасгалыг зогсоох</button>
            </div>
        `;
    }

    function checkQuiz(ans) {
        if(ans === gameState.shuffled[gameState.index].mn) {
            gameState.score++;
            showFeedback("ЗӨВ БАЙЛАА!", "success");
        } else {
            showFeedback("АНХААРААРАЙ, БУРУУ БАЙНА", "error");
        }
        setTimeout(() => {
            gameState.index++;
            if(gameState.index < 10) render();
            else renderResult();
        }, 1000);
    }

    function renderMiner(el) {
        const item = gameState.shuffled[gameState.index];
        const targetWord = item.raw.toUpperCase().replace(/[А́Е́И́О́У́Ы́Э́Ю́Я́]/g, (m) => m[0]);
        if(!gameState.minerRevealed) gameState.minerRevealed = new Set();

        el.innerHTML = `
            <div class="max-w-2xl mx-auto glass p-10 rounded-3xl text-center shadow-xl">
                <div class="mb-4 font-bold text-emerald-600 uppercase tracking-[0.2em] text-xs">Үг олборлогч</div>
                <h3 class="text-3xl font-black text-slate-800 mb-8">${item.mn}</h3>
                <div class="flex flex-wrap justify-center gap-2 mb-10">
                    ${targetWord.split('').map((char, i) => `
                        <div class="letter-slot ${gameState.minerRevealed.has(i) ? 'correct' : ''}">
                            ${gameState.minerRevealed.has(i) ? char : ''}
                        </div>
                    `).join('')}
                </div>
                <div class="grid grid-cols-7 sm:grid-cols-9 gap-2 max-w-lg mx-auto bg-slate-50/50 p-4 rounded-2xl">
                    ${"АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ".split('').map(char => `
                        <button onclick="guessLetter('${char}', '${targetWord}')" class="w-full aspect-square flex items-center justify-center glass rounded-xl font-bold text-slate-700 hover:bg-emerald-600 hover:text-white transition-all text-sm shadow-sm active:scale-90">
                            ${char}
                        </button>
                    `).join('')}
                </div>
                <button onclick="setTab('practice')" class="mt-10 text-slate-400 font-bold hover:text-red-500 uppercase text-xs tracking-widest">Буцах</button>
            </div>
        `;
    }

    function guessLetter(char, target) {
        let found = false;
        target.split('').forEach((c, i) => {
            if(c === char) {
                gameState.minerRevealed.add(i);
                found = true;
            }
        });

        if(!found) {
            // Энд алдааны эффект нэмж болно
        }

        if(gameState.minerRevealed.size === target.length) {
            gameState.score++;
            showFeedback("ОЛБОРЛОЛТ АМЖИЛТТАЙ!", "success");
            setTimeout(() => {
                gameState.index++;
                gameState.minerRevealed = null;
                if(gameState.index < 10) render();
                else renderResult();
            }, 800);
        } else {
            render();
        }
    }

    function renderListen(el) {
        const item = gameState.shuffled[gameState.index];
        el.innerHTML = `
            <div class="max-w-xl mx-auto glass p-12 rounded-3xl text-center shadow-2xl border-b-8 border-purple-200">
                <div class="text-xs font-bold text-purple-600 mb-6 uppercase tracking-[0.3em]">Сонсоод бичнэ үү</div>
                <div class="flex flex-col items-center mb-10">
                    <button onclick="playAudio(${item.id})" class="w-28 h-28 bg-purple-600 text-white rounded-full flex items-center justify-center transition-all transform hover:scale-105 shadow-xl hover:bg-purple-700 active:scale-95">
                        <svg class="w-14 h-14" fill="currentColor" viewBox="0 0 20 20"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"></path></svg>
                    </button>
                </div>
                <div class="text-lg font-bold text-slate-400 mb-8 italic">"${item.mn}"</div>
                <input type="text" id="listenInput" placeholder="..." autocomplete="off" class="w-full p-6 rounded-2xl border-2 border-slate-100 text-center text-3xl font-black uppercase mb-8 focus:border-purple-500 outline-none transition-all shadow-inner bg-slate-50/30" onkeyup="if(event.key==='Enter') checkListen()">
                <button onclick="checkListen()" class="w-full py-5 bg-purple-600 text-white rounded-2xl font-bold text-xl hover:bg-purple-700 transition-all shadow-lg">ШАЛГАХ</button>
                <button onclick="setTab('practice')" class="mt-8 text-slate-400 font-bold hover:text-red-500 text-xs tracking-widest uppercase">Зогсоох</button>
            </div>
        `;
        setTimeout(() => document.getElementById('listenInput').focus(), 200);
    }

    function checkListen() {
        const inputEl = document.getElementById('listenInput');
        if(!inputEl) return;
        const val = inputEl.value.trim().toUpperCase();
        const item = gameState.shuffled[gameState.index];
        const rawWord = item.raw.toUpperCase().replace(/[А́Е́И́О́У́Ы́Э́Ю́Я́]/g, (m) => m[0]);
        
        if(val === rawWord) {
            gameState.score++;
            showFeedback("МАШ САЙН БАЙЛАА!", "success");
        } else {
            showFeedback(`БУРУУ! Зөв нь: ${rawWord}`, "error");
            inputEl.classList.add('shake');
        }
        setTimeout(() => {
            gameState.index++;
            if(gameState.index < 10) render();
            else renderResult();
        }, 1500);
    }

    function renderScrambled(el) {
        const item = gameState.shuffled[gameState.index];
        const rawWord = item.raw.toUpperCase().replace(/[А́Е́И́О́У́Ы́Э́Ю́Я́]/g, (m) => m[0]);
        if(!gameState.scrambledWord) gameState.scrambledWord = rawWord.split('').sort(() => Math.random() - 0.5).join('');

        el.innerHTML = `
            <div class="max-w-xl mx-auto glass p-10 rounded-3xl text-center shadow-2xl">
                <div class="text-xs font-bold text-red-500 mb-6 uppercase tracking-[0.3em]">Үсгүүдийг эвлүүл</div>
                <h3 class="text-2xl font-black text-slate-800 mb-8 italic">"${item.mn}"</h3>
                <div class="flex flex-wrap justify-center gap-3 mb-10">
                    ${gameState.scrambledWord.split('').map(char => `
                        <span class="w-12 h-16 flex items-center justify-center glass rounded-2xl font-black text-3xl text-red-600 border-b-4 border-red-200 shadow-md transform rotate-2">${char}</span>
                    `).join('')}
                </div>
                <input type="text" id="guessInput" placeholder="Үгээ бичээрэй..." autocomplete="off" class="w-full p-6 rounded-2xl border-2 border-slate-100 text-center text-3xl font-black uppercase mb-8 focus:border-red-500 outline-none transition-all shadow-inner bg-slate-50/30" onkeyup="if(event.key==='Enter') checkScrambled()">
                <button onclick="checkScrambled()" class="w-full py-5 bg-slate-800 text-white rounded-2xl font-bold text-xl hover:bg-black transition-all shadow-xl">ШАЛГАХ</button>
                <button onclick="setTab('practice')" class="mt-10 text-slate-400 font-bold hover:text-red-500 text-xs tracking-widest uppercase">Зогсоох</button>
            </div>
        `;
        setTimeout(() => document.getElementById('guessInput').focus(), 200);
    }

    function checkScrambled() {
        const val = document.getElementById('guessInput').value.trim().toUpperCase();
        const item = gameState.shuffled[gameState.index];
        const rawWord = item.raw.toUpperCase().replace(/[А́Е́И́О́У́Ы́Э́Ю́Я́]/g, (m) => m[0]);
        
        if(val === rawWord) {
            gameState.score++;
            showFeedback("ЗӨВ ЭВЛҮҮЛЛЭЭ!", "success");
        } else {
            showFeedback(`БУРУУ! Зөв нь: ${rawWord}`, "error");
        }
        
        setTimeout(() => {
            gameState.index++;
            gameState.scrambledWord = null;
            if(gameState.index < 10) render();
            else renderResult();
        }, 1200);
    }

    function renderResult() {
        const container = document.getElementById('content');
        const percentage = (gameState.score / 10) * 100;
        let rank = "ХИЧЭЭХ ХЭРЭГТЭЙ";
        let emoji = "📚";
        
        if(percentage >= 90) { rank = "МАШ САЙН!"; emoji = "🏆"; }
        else if(percentage >= 70) { rank = "САЙН БАЙНА"; emoji = "⭐"; }

        container.innerHTML = `
            <div class="max-w-md mx-auto glass p-12 rounded-4xl text-center shadow-2xl border-t-8 border-yellow-400 transform animate-in fade-in zoom-in duration-500">
                <div class="text-8xl mb-6">${emoji}</div>
                <h2 class="text-4xl font-black text-slate-800 mb-2">${rank}</h2>
                <div class="my-10">
                    <p class="text-slate-400 text-sm uppercase font-bold tracking-widest mb-2">Таны оноо</p>
                    <div class="text-6xl font-black text-blue-900">${gameState.score} <span class="text-slate-300 text-3xl">/ 10</span></div>
                </div>
                <button onclick="setTab('practice')" class="w-full py-5 bg-blue-900 text-white rounded-2xl font-bold text-xl shadow-2xl hover:bg-black transition-all transform hover:scale-105 active:scale-95">ДАХИН ЭХЛЭХ</button>
            </div>
        `;
    }

    function renderFavorites(el) {
        const favVerbs = verbs.filter(v => learnedIds.has(v.id));
        if (favVerbs.length === 0) {
            el.innerHTML = `
                <div class="text-center p-20 glass rounded-3xl text-slate-400">
                    <div class="text-5xl mb-4 opacity-30">📂</div>
                    <div class="font-bold italic">Одоогоор цээжилсэн үг байхгүй байна. Үгний ард байх зөв тэмдэг дээр дарж нэмээрэй.</div>
                </div>`;
            return;
        }
        el.innerHTML = `
            <div class="flex justify-between items-center mb-8 px-4">
                <h2 class="text-xl font-bold text-slate-800">Миний цээжилсэн үгс (${favVerbs.length})</h2>
                <span class="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full font-bold">ЦЭЭЖИЛСЭН</span>
            </div>
        `;
        const list = document.createElement('div');
        list.className = 'grid grid-cols-1 md:grid-cols-2 gap-4';
        favVerbs.forEach(v => {
            list.innerHTML += `
                <div class="verb-card glass p-5 rounded-2xl flex justify-between items-center border-l-green-500 shadow-sm transition-all hover:-translate-y-1">
                    <div>
                        <div class="text-blue-900 font-black text-lg">${v.pair}</div>
                        <div class="text-slate-600 font-medium text-sm mt-1">${v.mn}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="playAudio(${v.id})" class="p-3 rounded-xl bg-blue-50 text-blue-600 hover:bg-blue-100 transition-colors">
                             <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"></path></svg>
                        </button>
                        <button onclick="toggleLearned(${v.id})" class="p-3 rounded-xl bg-red-50 text-red-400 hover:bg-red-500 hover:text-white transition-all shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                </div>
            `;
        });
        el.appendChild(list);
    }

    function showFeedback(msg, type) {
        const feedback = document.createElement('div');
        feedback.className = `fixed top-10 left-1/2 transform -translate-x-1/2 p-5 rounded-2xl text-white font-bold shadow-2xl z-50 transition-all duration-300 flex items-center gap-3 animate-in fade-in slide-in-from-top-4 ${type==='success' ? 'bg-green-600' : 'bg-red-600'}`;
        feedback.innerHTML = `
            <span>${type === 'success' ? '✔' : '✖'}</span>
            <span>${msg}</span>
        `;
        document.body.appendChild(feedback);
        setTimeout(() => {
            feedback.style.opacity = '0';
            feedback.style.transform = 'translate(-50%, -20px)';
            setTimeout(() => feedback.remove(), 400);
        }, 1600);
    }

    // Анхны ачаалалт
    window.onload = () => {
        setTab('dict');
    };
</script>

</body>
</html>
