        if (learnedIds.has(id)) learnedIds.delete(id);

    function playAudio(verbId) {
        const audio = new Audio(`${verbId}.mp3`);
        audio.play().catch(e => {
            const verb = verbs.find(v => v.id === verbId);
            if (!verb) return;
            const utterance = new SpeechSynthesisUtterance(verb.raw);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        });
    }

        const fb = document.getElementById('feedback');
        fb.textContent = msg;

        setTimeout(() => fb.style.opacity = "0", 2500);

    function createConjBox(title, forms) {
        let rows = '';
        for (let p in forms) {
            rows += `<tr><td class="w-1/3 text-slate-400 font-bold">${p}</td><td class="text-blue-900 font-black text-base">${forms[p]}</td></tr>`;

        return `
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4 border-b pb-2 flex items-center gap-2">📌 ${title}</h3>
                <table class="w-full text-left font-sans text-sm space-y-2">${rows}</table>
            </div>`;
    }

    function renderPracticeMenu(el) {
        el.innerHTML = `
            <div class="max-w-3xl mx-auto text-center">
                <h2 class="text-2xl font-black text-slate-800 mb-2">🎯 Дасгал ажиллах горим</h2>
                <p class="text-slate-400 text-sm mb-10 font-medium">Өөрийн мэдлэгийг баталгаажуулах тоглоомын хэлбэрийг сонгоно уу.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div onclick="startGame('quiz')" class="glass p-8 rounded-3xl cursor-pointer hover:border-blue-900 transition-all text-left group">
                        <div class="w-12 h-12 rounded-2xl bg-blue-50 text-blue-900 font-black flex items-center justify-center text-xl mb-4 group-hover:bg-blue-900 group-hover:text-white transition-all">A</div>
                        <h3 class="font-black text-slate-800 text-lg mb-1">Сонгох тест</h3>
                        <p class="text-slate-400 text-xs font-medium">Орос үг өгөгдөхөд зөв орчуулгыг 4 сонголтоос олно.</p>
                    </div>
                    <div onclick="startGame('write')" class="glass p-8 rounded-3xl cursor-pointer hover:border-blue-900 transition-all text-left group">
                        <div class="w-12 h-12 rounded-2xl bg-red-50 text-red-600 font-black flex items-center justify-center text-xl mb-4 group-hover:bg-red-600 group-hover:text-white transition-all">✏️</div>
                        <h3 class="font-black text-slate-800 text-lg mb-1">Үг бөглөх</h3>
                        <p class="text-slate-400 text-xs font-medium">Монгол орчуулгад тохирох орос үгийг гарнаас бичнэ.</p>
                    </div>
                    <div onclick="startGame('listen')" class="glass p-8 rounded-3xl cursor-pointer hover:border-blue-900 transition-all text-left group">
                        <div class="w-12 h-12 rounded-2xl bg-green-50 text-green-600 font-black flex items-center justify-center text-xl mb-4 group-hover:bg-green-600 group-hover:text-white transition-all">🎧</div>
                        <h3 class="font-black text-slate-800 text-lg mb-1">Сонсоод олох</h3>
                        <p class="text-slate-400 text-xs font-medium">Үгийн дуудлагыг сонсоод зөв үгийг сонгоно.</p>
                    </div>
                    <div onclick="startGame('scrambled')" class="glass p-8 rounded-3xl cursor-pointer hover:border-blue-900 transition-all text-left group">
                        <div class="w-12 h-12 rounded-2xl bg-purple-50 text-purple-600 font-black flex items-center justify-center text-xl mb-4 group-hover:bg-purple-600 group-hover:text-white transition-all">🔠</div>
                        <h3 class="font-black text-slate-800 text-lg mb-1">Үсэг эвлүүлэх</h3>
                        <p class="text-slate-400 text-xs font-medium">Үсгүүдийг зөв дараалалд оруулж орос үгийг бүтээгээрэй.</p>
                    </div>
                </div>
            </div>`;
    }

    function startGame(mode) {
        gameMode = mode;
        gameState = { score: 0, current: 0, total: 10, wrongs: [] };
        let pool = verbs.length > 0 ? [...verbs] : [];
        gameState.questions = pool.sort(() => 0.5 - Math.random()).slice(0, 10);
        render();
    }

    function renderQuiz(el) {
        if (gameState.current >= gameState.total) { renderGameResult(el); return; }
        let q = gameState.questions[gameState.current];
        let options = [q.mn];
        while(options.length < 4) {
            let rand = verbs[Math.floor(Math.random()*verbs.length)].mn;
            if(!options.includes(rand)) options.push(rand);
        }
        options.sort(() => 0.5 - Math.random());

        let cleanQWord = q.pair ? q.pair.replace(/́/g, "") : q.raw.replace(/́/g, "");

        el.innerHTML = `
            <div class="max-w-xl mx-auto game-card glass p-8 rounded-3xl">
                <div class="flex justify-between items-center mb-6"><span class="text-xs font-black text-slate-400 uppercase tracking-widest">Тест: ${gameState.current+1}/${gameState.total}</span><span class="text-xs font-black text-green-600 bg-green-50 px-2 py-1 rounded">Оноо: ${gameState.score}</span></div>
                <div class="text-center py-10 bg-blue-50/50 rounded-2xl mb-6"><span class="text-xs font-black text-blue-600 uppercase tracking-wider block mb-2">Орос үг:</span><h2 class="text-3xl font-black text-slate-800">${cleanQWord}</h2></div>
                <div class="grid grid-cols-1 gap-3">
                    ${options.map(o => `<button onclick="submitAnswer('${o.replace(/'/g, "\\'")}', '${q.mn.replace(/'/g, "\\'")}')" class="w-full p-4 text-left font-bold text-slate-700 bg-slate-50 hover:bg-blue-50 border-2 border-slate-100 hover:border-blue-300 rounded-xl transition-all text-sm">${o}</button>`).join('')}
                </div>
            </div>`;
    }

    function renderWrite(el) {
        if (gameState.current >= gameState.total) { renderGameResult(el); return; }
        let q = gameState.questions[gameState.current];
        el.innerHTML = `
            <div class="max-w-xl mx-auto game-card glass p-8 rounded-3xl">
                <div class="flex justify-between items-center mb-6"><span class="text-xs font-black text-slate-400 uppercase tracking-widest">Бичих: ${gameState.current+1}/${gameState.total}</span><span class="text-xs font-black text-green-600 bg-green-50 px-2 py-1 rounded">Оноо: ${gameState.score}</span></div>
                <div class="text-center py-10 bg-red-50/30 rounded-2xl mb-6"><span class="text-xs font-black text-red-500 uppercase tracking-wider block mb-2">Монгол утга:</span><h2 class="text-xl font-black text-slate-800">${q.mn}</h2></div>
                <div class="space-y-4">
                    <input type="text" id="writeAns" placeholder="Орос үгийг бичнэ үү..." class="w-full p-4 rounded-xl border-2 border-slate-100 font-bold text-slate-700 outline-none" onkeypress="if(event.key==='Enter') submitWrite()">
                    <button onclick="submitWrite()" class="w-full py-4 bg-blue-900 text-white rounded-xl font-black text-xs uppercase tracking-widest hover:bg-black transition-all">Шалгах</button>
                </div>
            </div>`;
        setTimeout(() => document.getElementById('writeAns')?.focus(), 100);
    }

    function submitWrite() {
        let input = document.getElementById('writeAns').value.trim().toLowerCase();
        let q = gameState.questions[gameState.current];
        
        let cleanRaw = q.raw ? q.raw.toLowerCase().replace(/́/g, "").trim() : "";
        let cleanInput = input.toLowerCase().replace(/́/g, "").trim();

        if (cleanInput === cleanRaw) {
            gameState.score++;
            showFeedback("Зөв хариуллаа!", "success");
        } else {
            gameState.wrongs.push({ word: q.pair, right: q.raw, your: input });
            showFeedback(`Буруу! Зөв нь: ${q.raw}`, "error");
        }
        gameState.current++;
        render();
    }

    function renderListen(el) {
        if (gameState.current >= gameState.total) { renderGameResult(el); return; }
        let q = gameState.questions[gameState.current];
        let options = [q.pair];
        while(options.length < 4) {
            let rand = verbs[Math.floor(Math.random()*verbs.length)].pair;
            if(!options.includes(rand)) options.push(rand);
        }
        options.sort(() => 0.5 - Math.random());

        el.innerHTML = `
            <div class="max-w-xl mx-auto game-card glass p-8 rounded-3xl text-center">
                <div class="flex justify-between items-center mb-6"><span class="text-xs font-black text-slate-400 uppercase tracking-widest text-left">Сонсох: ${gameState.current+1}/${gameState.total}</span><span class="text-xs font-black text-green-600 bg-green-50 px-2 py-1 rounded text-right">Оноо: ${gameState.score}</span></div>
                <button onclick="playAudio(${q.id})" class="mx-auto w-24 h-24 rounded-full bg-green-50 text-green-600 flex items-center justify-center shadow-lg hover:scale-105 transition-all mb-8">
                    <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 20 20"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"></path></svg>
                </button>
                <div class="grid grid-cols-1 gap-3 text-left">
                    ${options.map(o => {
                        let cleanO = o.replace(/́/g, "");
                        let cleanQ = q.pair.replace(/́/g, "");
                        return `<button onclick="submitAnswer('${cleanO.replace(/'/g, "\\'")}', '${cleanQ.replace(/'/g, "\\'")}')" class="w-full p-4 font-bold text-slate-700 bg-slate-50 hover:bg-blue-50 border-2 border-slate-100 hover:border-blue-300 rounded-xl transition-all text-sm">${cleanO}</button>`;
                    }).join('')}
                </div>
            </div>`;
        playAudio(q.id);
    }

    function renderScrambled(el) {
        if (gameState.current >= gameState.total) { renderGameResult(el); return; }
        let q = gameState.questions[gameState.current];
        let cleanRaw = q.raw.replace(/́/g, "");
        
        if (!gameState.scrambledLetters) {
            gameState.scrambledLetters = cleanRaw.split('').sort(() => 0.5 - Math.random());
            gameState.userLetters = [];
        }

        el.innerHTML = `
            <div class="max-w-xl mx-auto game-card glass p-8 rounded-3xl">
                <div class="flex justify-between items-center mb-6"><span class="text-xs font-black text-slate-400 uppercase tracking-widest">Эвлүүлэх: ${gameState.current+1}/${gameState.total}</span><span class="text-xs font-black text-green-600 bg-green-50 px-2 py-1 rounded">Оноо: ${gameState.score}</span></div>
                <div class="text-center py-6 bg-purple-50/30 rounded-2xl mb-6"><span class="text-xs font-black text-purple-600 uppercase tracking-wider block mb-1">Утга:</span><h2 class="text-xl font-black text-slate-800">${q.mn}</h2></div>
                
                <div class="flex flex-wrap justify-center gap-2 min-h-[60px] p-4 bg-slate-50 rounded-xl mb-6 border-2 border-dashed">
                    ${gameState.userLetters.map((l, i) => `<button onclick="removeLetter(${i})" class="w-12 h-12 rounded-xl bg-blue-900 text-white font-black text-lg shadow-md">${l}</button>`).join('')}
                </div>

                <div class="flex flex-wrap justify-center gap-2 mb-6">
                    ${gameState.scrambledLetters.map((l, i) => `<button onclick="addLetter(${i})" class="w-12 h-12 rounded-xl bg-white hover:bg-slate-100 border-2 font-black text-lg text-slate-700 shadow-sm">${l}</button>`).join('')}
                </div>

                <div class="flex gap-2">
                    <button onclick="clearScrambled()" class="w-1/3 py-4 bg-slate-100 text-slate-600 font-black rounded-xl text-xs uppercase tracking-wider">Цэвэрлэх</button>
                    <button onclick="submitScrambled()" class="w-2/3 py-4 bg-blue-900 text-white font-black rounded-xl text-xs uppercase tracking-wider shadow-lg">Илгээх</button>
                </div>
            </div>`;
    }

    function addLetter(idx) {
        let l = gameState.scrambledLetters.splice(idx, 1)[0];
        gameState.userLetters.push(l);
        render();
    }

    function removeLetter(idx) {
        let l = gameState.userLetters.splice(idx, 1)[0];
        gameState.scrambledLetters.push(l);
        render();
    }

    function clearScrambled() {
        let q = gameState.questions[gameState.current];
        let cleanRaw = q.raw.replace(/́/g, "");
        gameState.scrambledLetters = cleanRaw.split('').sort(() => 0.5 - Math.random());
        gameState.userLetters = [];
        render();
    }

    function submitScrambled() {
        let q = gameState.questions[gameState.current];
        let cleanRaw = q.raw.toLowerCase().replace(/́/g, "").trim();
        let userWord = gameState.userLetters.join('').toLowerCase().trim();

        if (userWord === cleanRaw) {
            gameState.score++;
            showFeedback("Зөв хариуллаа!", "success");
        } else {
            gameState.wrongs.push({ word: q.pair, right: q.raw, your: userWord || "---" });
            showFeedback(`Буруу! Зөв нь: ${q.raw}`, "error");
        }
        gameState.scrambledLetters = null;
        gameState.current++;
        render();
    }

    function submitAnswer(selected, correct) {
        let q = gameState.questions[gameState.current];
        
        let cleanSel = selected.toLowerCase().replace(/́/g, "").trim();
        let cleanCorr = correct.toLowerCase().replace(/́/g, "").trim();

        if (cleanSel === cleanCorr) {
            gameState.score++;
            showFeedback("Зөв хариуллаа!", "success");
        } else {
            gameState.wrongs.push({ word: q.pair, right: correct, your: selected });
            showFeedback("Буруу хариуллаа!", "error");
        }
        gameState.current++;
        render();
    }

    function renderGameResult(el) {
        el.innerHTML = `
            <div class="max-w-md mx-auto text-center game-card glass p-10 rounded-[2.5rem]">
                <span class="text-5xl">🎉</span>
                <h2 class="text-2xl font-black text-slate-800 mt-4 mb-1">Дасгал дууслаа!</h2>
                <p class="text-slate-400 text-xs font-bold mb-6 uppercase tracking-wider">Амжилтын хураангуй</p>
                <div class="bg-blue-50/50 p-6 rounded-2xl mb-6">
                    <span class="text-xs font-black text-blue-900 uppercase tracking-widest block mb-1">Нийт оноо:</span>
                    <div class="text-4xl font-black text-blue-950">${gameState.score} <span class="text-lg text-slate-400 font-bold">/ ${gameState.total}</span></div>
                </div>
                ${gameState.wrongs.length > 0 ? `
                    <div class="text-left bg-red-50/50 p-4 rounded-xl mb-6 text-xs text-red-700 max-h-40 overflow-y-auto">
                        <p class="font-black uppercase tracking-wider mb-2">❌ Алдсан үгс:</p>
                        ${gameState.wrongs.map(w => `<p class="mb-1"><strong>${w.word}</strong> - Зөв: ${w.right} (Та: ${w.your})</p>`).join('')}
                    </div>` : ''}
                <button onclick="setTab('practice')" class="w-full py-4 bg-blue-900 text-white font-black rounded-xl text-xs uppercase tracking-widest shadow-lg hover:bg-black transition-all">Цэс рүү буцах</button>
            </div>`;
    }

    // ========================================================
    // ШАЛГАЛТЫН СИСТЕМ БА GOOGLE SHEETS-ТЭЙ ХОЛБОХ ХЭСЭГ
    // ========================================================
    function renderExamMenu(el) {
        el.innerHTML = `
            <div id="exam" class="tab-content py-4 animate-fade-in">
                <div class="bg-white/90 backdrop-blur-md p-8 rounded-3xl shadow-xl max-w-2xl mx-auto border border-blue-50">
                    <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">
                        <span>📋 IX Ангийн Орос Хэлний Шалгалт</span>
                    </h2>
                    <p class="text-slate-500 text-sm mb-6">Сурах бичгийн 100 үйл үгнээс санамсаргүй 10 үг ирнэ. Шалгалт дуусахад дүн багш руу автоматаар илгээгдэнэ.</p>

                    <div id="exam-register" class="space-y-4">
                        <div>
                            <label class="block text-xs font-black text-slate-500 uppercase tracking-wider mb-2">Сурагчийн Овог Нэр:</label>
                            <input type="text" id="student-name" placeholder="Жишээ нь: Болдын Тэмүүлэн" class="w-full p-4 rounded-2xl border-2 border-slate-100 focus:border-blue-950 outline-none font-bold text-slate-700">
                        </div>
                        <div>
                            <label class="block text-xs font-black text-slate-500 uppercase tracking-wider mb-2">Анги / Бүлэг:</label>
                            <input type="text" id="student-class" placeholder="Жишээ нь: 9А" class="w-full p-4 rounded-2xl border-2 border-slate-100 focus:border-blue-950 outline-none font-bold text-slate-700">
                        </div>
                        <button onclick="startExam()" class="w-full py-4 bg-blue-950 text-white font-black rounded-2xl shadow-lg hover:bg-black transition-all uppercase tracking-wider text-sm">Шалгалт эхлүүлэх 🚀</button>
                    </div>

                    <div id="exam-area" class="hidden">
                        <div class="flex justify-between items-center mb-6 bg-slate-50 p-4 rounded-2xl">
                            <span id="exam-progress" class="font-black text-blue-950 text-sm">Асуулт: 1 / 10</span>
                            <span id="exam-score-live" class="font-bold text-green-600 text-sm">Зөв: 0</span>
                        </div>
                        
                        <div class="mb-6 text-center py-8 bg-blue-50/50 rounded-2xl border border-blue-100">
                            <span class="text-xs font-bold text-blue-600 uppercase tracking-wide block mb-1">Орос үг:</span>
                            <div id="exam-question-word" class="text-3xl font-black text-slate-800">---</div>
                        </div>

                    <div id="exam-options" class="grid grid-cols-1 gap-3">
                        </div>
                </div>

                <div id="exam-result" class="hidden text-center space-y-6 py-6">
                    <div class="inline-flex p-4 bg-green-50 rounded-full text-green-500 text-4xl font-bold">🎉</div>
                    <h3 class="text-2xl font-black text-slate-800">Шалгалт амжилттай дууслаа!</h3>
                    <div class="bg-slate-50 p-6 rounded-2xl max-w-md mx-auto space-y-2">
                        <p class="text-slate-600 font-medium">Сурагч: <span id="res-name" class="font-black text-slate-800">---</span></p>
                        <p class="text-slate-600 font-medium">Анги: <span id="res-class" class="font-black text-slate-800">---</span></p>
                        <p class="text-xl font-bold text-blue-950">Нийт оноо: <span id="res-score" class="text-2xl font-black text-green-600">0</span> / 10</p>
                    </div>
                    <div id="exam-wrong-list" class="text-left max-w-md mx-auto text-xs bg-red-50 text-red-700 p-4 rounded-2xl hidden">
                        <p class="font-bold mb-2">❌ Алдсан үгсээ дахин давтаарай:</p>
                        <ul id="wrong-words-ul" class="list-disc pl-4 space-y-1"></ul>
                    </div>
                    <p class="text-xs text-slate-400 animate-pulse mt-4">📊 Дүн багшийн Google Sheet рүү илгээгдэж байна...</p>
                </div>
            </div>
        </div>
    `;
}

let examQuestions = [];
let currentExamIndex = 0;
let examScore = 0;
let studentName = "";
let studentClass = "";
let wrongWords = [];

function startExam() {
    studentName = document.getElementById('student-name').value.trim();
    studentClass = document.getElementById('student-class').value.trim();

    if (!studentName || !studentClass) {
        alert("Овог нэр, ангиа заавал бөглөнө үү!");
        return;
    }

    let shuffled = [...verbs].sort(() => 0.5 - Math.random());
    examQuestions = shuffled.slice(0, 10);
    
    currentExamIndex = 0;
    examScore = 0;
    wrongWords = [];

    document.getElementById('exam-register').classList.add('hidden');
    document.getElementById('exam-area').classList.remove('hidden');
    document.getElementById('exam-result').classList.add('hidden');

    showExamQuestion();
}

function showExamQuestion() {
    if (currentExamIndex >= 10) {
        finishExam();
        return;
    }

    document.getElementById('exam-progress').innerText = `Асуулт: ${currentExamIndex + 1} / 10`;
    document.getElementById('exam-score-live').innerText = `Зөв: ${examScore}`;

    let currentQuestion = examQuestions[currentExamIndex];
    let cleanQWord = currentQuestion.pair ? currentQuestion.pair.replace(/́/g, "") : currentQuestion.raw.replace(/́/g, "");
    document.getElementById('exam-question-word').innerText = cleanQWord;

    let correctAnswer = currentQuestion.mn;
    let wrongAnswers = verbs
        .filter(v => v.mn !== correctAnswer)
        .sort(() => 0.5 - Math.random())
        .slice(0, 3)
        .map(v => v.mn);

    let options = [correctAnswer, ...wrongAnswers].sort(() => 0.5 - Math.random());
    let optionsDiv = document.getElementById('exam-options');
    optionsDiv.innerHTML = '';

    options.forEach(opt => {
        let btn = document.createElement('button');
        btn.className = "w-full p-4 text-left font-bold text-slate-700 bg-slate-50 hover:bg-blue-50 border-2 border-slate-100 hover:border-blue-300 rounded-2xl transition-all text-sm";
        btn.innerText = opt;
        btn.onclick = () => checkExamAnswer(opt, correctAnswer, currentQuestion);
        optionsDiv.appendChild(btn);
    });
}

function checkExamAnswer(selected, correct, questionObj) {
    if (selected === correct) {
        examScore++;
    } else {
        let cleanQWord = questionObj.pair ? questionObj.pair.replace(/́/g, "") : questionObj.raw.replace(/́/g, "");
        wrongWords.push(`${cleanQWord} (${correct})`);
    }
    currentExamIndex++;
    showExamQuestion();
}

function finishExam() {
    document.getElementById('exam-area').classList.add('hidden');
    document.getElementById('exam-result').classList.remove('hidden');

    document.getElementById('res-name').innerText = studentName;
    document.getElementById('res-class').innerText = studentClass;
    document.getElementById('res-score').innerText = examScore;

    let wrongDiv = document.getElementById('exam-wrong-list');
    let wrongUl = document.getElementById('wrong-words-ul');
    wrongUl.innerHTML = '';
    
    if (wrongWords.length > 0) {
        wrongDiv.classList.remove('hidden');
        wrongWords.forEach(w => {
            let li = document.createElement('li');
            li.innerText = w;
            wrongUl.appendChild(li);
        });
    } else {
        wrongDiv.classList.add('hidden');
    }

    sendDataToGoogleSheet();
}

function sendDataToGoogleSheet() {
    // Та өөрийн Google Form-ын URL болон entry ID-нуудыг энд сольж тавина
    const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSfXXXXXXXXXXXXXX/formResponse"; 
    let formData = new FormData();
    formData.append("entry.1111111111", studentName);   
    formData.append("entry.2222222222", studentClass);  
    formData.append("entry.3333333333", examScore);     
    formData.append("entry.4444444444", wrongWords.join(', ') || "Бүгд зөв"); 

    fetch(formURL, { method: "POST", mode: "no-cors" })
    .then(() => console.log("Дүн амжилттай илгээгдлээ"))
    .catch((e) => console.error(e));
}

    // Эхлэл хуудас ачаалахад дэлгэцийг зурах
    document.addEventListener("DOMContentLoaded", () => {
        setTab('dict');
    });
</script>
