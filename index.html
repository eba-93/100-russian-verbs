    <meta charset="UTF-8">

    <title>Мир Глаголов - Засагдсан</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ru-blue: #0039A6; --ru-red: #D52B1E; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), 
                        url('https://images.unsplash.com/photo-1513326738677-b964603b136d?auto=format&fit=crop&q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }
        .accent-font { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); }
        .nav-btn.active { background: var(--ru-blue); color: white; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,57,166,0.3); }
        .verb-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 1.2rem; }
        .verb-card:hover { transform: scale(1.02); }
        .progress-bar { height: 10px; background: #E2E8F0; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--ru-blue), var(--ru-red)); transition: width 0.3s ease; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .target-highlight { background-color: #dbeafe; color: #1d4ed8; padding: 0 4px; border-radius: 4px; font-weight: 900; }
        .target-dim { color: #94a3b8; font-weight: normal; }
        
        /* Volume Slider Styling */
        input[type=range] { -webkit-appearance: none; background: #e2e8f0; border-radius: 5px; height: 4px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--ru-blue); cursor: pointer; }
    </style>
</head>
<body class="pb-20">

<div class="fixed top-4 right-4 z-50 glass p-3 rounded-2xl flex flex-col items-center gap-2 border-t-4 border-blue-600 shadow-lg">
    <audio id="bgMusic" loop>
        <source src="song1.mp3" type="audio/mpeg">
    </audio>
    <div class="flex items-center gap-3">
        <button onclick="toggleMusic()" id="musicBtn" class="p-2 bg-slate-100 rounded-full text-blue-600 hover:bg-blue-100 transition-colors">
            <svg id="musicIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
        </button>
        <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="adjustVolume(this.value)" class="w-20">
    </div>
</div>

<div id="app" class="max-w-4xl mx-auto px-4 pt-8">

    <main id="content" class="animate-fade"></main>
</div>

        let isCorrect = false;
        let correctValue = "";
        const clean = (str) => str.replace(/[́]/g, '').toLowerCase().trim();

        if (quiz.mode === 'reading') {
            const regex = new RegExp(`<v${quiz.subStep}:(\\d+)>(.*?)</v${quiz.subStep}>`, 'g');
            const match = regex.exec(current.text);
            if (match) {
                const targetVerb = verbs.find(v => v.id == match[1]);
                correctValue = targetVerb.nsf;
                isCorrect = clean(targetVerb.nsf) === clean(ans);
            }
        } else if (quiz.mode === 'ru_mn') {
            correctValue = current.mn;
            isCorrect = ans === correctValue;
        } else if (quiz.mode === 'mn_ru') {
            correctValue = current.nsf;
            isCorrect = ans === correctValue;
        } else {
            correctValue = current.nsf.replace(/[́]/g, '');
            isCorrect = clean(ans) === clean(correctValue);
        }

        if (verbId) playVerbAudio(verbId);
        quiz.isCorrect = isCorrect;
        quiz.correctValue = correctValue;
        if (isCorrect) quiz.score++;
        quiz.answered = true;
        render();
    }

    function render() {
        const container = document.getElementById('content');
        if (quiz.active) return renderQuiz(container);
        
        switch(currentTab) {
            case 'dict': renderDict(container); break;
            case 'practice': renderPracticeMenu(container); break;
            case 'favorites': renderFavorites(container); break;
        }
    }

    function renderDict(el) {
        const cleanStr = (s) => s.replace(/[́]/g, '').toLowerCase();
        const filteredVerbs = verbs.filter(v => {
            if (!searchQuery) return true;
            return cleanStr(v.nsf).includes(searchQuery) || cleanStr(v.sf).includes(searchQuery) || v.mn.toLowerCase().includes(searchQuery);
        });

        const start = (currentPage - 1) * 10;
        const pageItems = filteredVerbs.slice(start, start + 10);
        
        el.innerHTML = `
            <div class="mb-8">
                <input type="text" value="${searchQuery}" placeholder="Хайх..." oninput="searchQuery=this.value; currentPage=1; render();" class="glass w-full p-4 rounded-2xl outline-none font-bold">
            </div>
            <div class="grid gap-4 mb-10">
                ${pageItems.map(v => `
                    <div class="verb-card glass p-6 flex flex-col md:flex-row md:items-center justify-between border-l-4 ${learnedIds.has(v.id) ? 'border-green-500' : 'border-blue-500'}">
                        <div>
                            <div class="flex items-center gap-2">
                                <h3 class="text-xl font-black text-slate-800">${v.nsf} <span class="text-blue-600">${v.sf}</span></h3>
                                <span class="text-xs font-black text-blue-500 bg-blue-50 px-2 py-1 rounded">${v.up}</span>
                            </div>
                            <p class="text-sm font-bold text-slate-600 mt-1">${v.mn}</p>
                        </div>
                        <div class="flex gap-2 mt-4 md:mt-0">
                            <button onclick="playVerbAudio(${v.id})" class="p-3 bg-blue-50 text-blue-600 rounded-full"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9h4l5-5v16l-5-5h-4v-6z"/></svg></button>
                            <button onclick="toggleLearned(${v.id})" class="p-3 ${learnedIds.has(v.id) ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-400'} rounded-full"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></button>
                        </div>
                    </div>
                `).join('')}
            </div>
            <div class="flex justify-center flex-wrap gap-2 pb-10">
                ${Array.from({length: Math.ceil(filteredVerbs.length / 10)}).map((_, i) => `
                    <button onclick="currentPage=${i+1}; render();" class="w-10 h-10 rounded-lg font-black text-xs ${currentPage === i+1 ? 'bg-blue-600 text-white' : 'glass text-slate-500'}">${i+1}</button>
                `).join('')}
            </div>
        `;
    }

    function renderPracticeMenu(el) {
        const modes = [
            { id: 'listen_write', t: 'Сонсоод бичих', icon: '🎧' },
            { id: 'ru_mn', t: 'Орос → Монгол', icon: '🇷🇺' },
            { id: 'mn_ru', t: 'Монгол → Орос', icon: '🇲🇳' },
            { id: 'reading', t: 'Эх дээр ажиллах', icon: '📖' }
        ];
        el.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">${modes.map(m => `
            <button onclick="startPractice('${m.id}')" class="glass p-10 rounded-[2rem] text-center hover:scale-105 transition-transform group border-b-4 border-transparent hover:border-blue-500">
                <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">${m.icon}</div>
                <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">${m.t}</h3>
            </button>`).join('')}</div>`;
    }

    function renderQuiz(el) {
        const current = quiz.items[quiz.index];
        const progress = (quiz.index / quiz.items.length) * 100;
        let content = '';

        if (quiz.mode === 'listen_write') {
            content = `<div class="text-center">
                <div class="mb-6"><span class="bg-blue-100 text-blue-600 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest">Диктант</span></div>
                <button onclick="playVerbAudio(${current.id})" class="w-24 h-24 bg-blue-600 text-white rounded-3xl mb-10 mx-auto flex items-center justify-center shadow-xl hover:bg-blue-700 active:scale-95 transition-all">
                    <svg class="w-12 h-12" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9h4l5-5v16l-5-5h-4v-6z"/></svg>
                </button>
                <div class="relative group">
                    <input type="text" id="quizInput" 
                        class="w-full bg-white border-4 border-slate-200 p-8 rounded-[2rem] text-center text-3xl font-black outline-none focus:border-blue-600 focus:ring-8 focus:ring-blue-100 transition-all text-slate-800 placeholder:text-slate-200" 
                        placeholder="..." 
                        autofocus 
                        onkeyup="if(event.key==='Enter')handleAnswer(this.value)">
                    <div class="text-xs font-black text-slate-400 mt-4 uppercase">Enter дарж шалгана уу</div>
                </div>
            </div>`;
        } else if (quiz.mode === 'reading') {
            let processedText = current.text.replace(/<v(\d+):(\d+)>(.*?)<\/v\1>/g, (match, step, id, word) => {
                const isCurrent = parseInt(step) === quiz.subStep;
                const isDone = parseInt(step) < quiz.subStep;
                return `<span class="${isCurrent ? 'target-highlight border-b-2 border-blue-500' : (isDone ? 'text-blue-700' : 'target-dim')}">${word}</span>`;
            });
            content = `<div>
                <div class="text-2xl text-slate-700 leading-relaxed mb-8 bg-white/50 p-8 rounded-[2rem] font-medium border-2 border-slate-100 shadow-inner">${processedText}</div>
                <input type="text" id="quizInput" class="w-full bg-white border-4 border-slate-200 p-6 rounded-2xl text-center text-2xl font-black outline-none focus:border-blue-600 transition-all" placeholder="Инфинитив бичнэ үү" autofocus onkeyup="if(event.key==='Enter')handleAnswer(this.value)">
            </div>`;
        } else {
            const options = [current];
            while(options.length < 4) {
                const r = verbs[Math.floor(Math.random()*verbs.length)];
                if(!options.find(o => o.id === r.id)) options.push(r);
            }
            options.sort(() => Math.random() - 0.5);
            content = `<div class="text-center">
                <h2 class="text-4xl font-black text-slate-800 mb-10">${quiz.mode === 'ru_mn' ? current.nsf : current.mn}</h2>
                <div class="grid gap-3">${options.map(opt => {
                    const val = quiz.mode === 'ru_mn' ? opt.mn : opt.nsf;
                    return `<button onclick="handleAnswer('${val}', ${opt.id})" class="p-6 bg-white border-2 border-slate-100 rounded-[1.5rem] font-bold text-slate-700 hover:bg-blue-50 hover:border-blue-200 transition-all active:scale-95 text-lg">${val}</button>`;
                }).join('')}</div>
            </div>`;
        }

        el.innerHTML = `
            <div class="max-w-xl mx-auto glass p-10 rounded-[3rem] shadow-2xl relative overflow-hidden border-2 border-white">
                <div class="absolute top-0 left-0 w-full h-2 progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                <div class="flex justify-between items-center mb-10">
                    <span class="text-sm font-black text-slate-400 bg-slate-100 px-3 py-1 rounded-lg uppercase tracking-widest">${quiz.index + 1} / ${quiz.items.length}</span>
                    <button onclick="setTab('practice')" class="text-xs font-black text-red-500 hover:text-red-700 uppercase tracking-tighter">Зогсоох</button>
                </div>
                ${quiz.answered ? renderFeedback() : content}
            </div>
        `;
    }

    function renderFeedback() {
        const current = quiz.items[quiz.index];
        const nextSubStep = (quiz.mode === 'reading' && current.text) ? current.text.includes(`<v${quiz.subStep + 1}:`) : false;
        const btnText = (quiz.index === quiz.items.length - 1 && !nextSubStep) ? 'Үр дүнг харах' : 'Үргэлжлүүлэх';

        return `<div class="text-center py-6 animate-fade">
            <div class="text-7xl mb-6">${quiz.isCorrect ? '🌟' : '💡'}</div>
            <h3 class="text-4xl font-black ${quiz.isCorrect ? 'text-green-600' : 'text-orange-500'} mb-2 tracking-tight">${quiz.isCorrect ? 'МАШ САЙН!' : 'АНХААРААРАЙ!'}</h3>
            ${!quiz.isCorrect ? `<div class="bg-slate-50 border-2 border-dashed border-slate-200 p-6 rounded-2xl mb-8 mt-4">
                <p class="text-xs font-black text-slate-400 uppercase mb-2">Зөв хариулт:</p>
                <p class="text-3xl font-black text-slate-800">${quiz.correctValue}</p>
            </div>` : '<div class="h-8"></div>'}
            <button onclick="nextStep()" class="w-full py-6 bg-slate-800 text-white rounded-[2rem] font-black uppercase tracking-widest hover:bg-slate-900 shadow-xl transition-all active:scale-95">
                ${btnText}
            </button>
        </div>`;
    }

    function nextStep() {
        const current = quiz.items[quiz.index];
        const nextSubStepExists = quiz.mode === 'reading' && current.text.includes(`<v${quiz.subStep + 1}:`);
        
        if (nextSubStepExists) {
            quiz.subStep++;
            quiz.answered = false;
            render();
        } else if (quiz.index < quiz.items.length - 1) {
            quiz.index++;
            quiz.subStep = 1;
            quiz.answered = false;
            render();
        } else {
            renderResults();
        }
    }

    function renderResults() {
        document.getElementById('content').innerHTML = `
            <div class="max-w-xl mx-auto glass p-12 rounded-[3.5rem] text-center animate-fade shadow-2xl border-4 border-blue-50">
                <div class="text-8xl mb-6">🏆</div>
                <h2 class="text-3xl font-black text-slate-800 mb-2 uppercase">Хичээл амжилттай!</h2>
                <div class="text-6xl font-black text-blue-600 my-8">${quiz.score} / ${quiz.items.length}</div>
                <p class="text-slate-500 mb-10 font-medium">Таны мэдлэг нэг шатаар ахилаа.</p>
                <button onclick="setTab('practice')" class="w-full py-6 bg-blue-600 text-white rounded-[2rem] font-black uppercase tracking-widest hover:bg-blue-700 shadow-lg">Дуусгах</button>
            </div>`;
    }

    function renderFavorites(el) {
        const favorites = verbs.filter(v => learnedIds.has(v.id));
        if (favorites.length === 0) { el.innerHTML = `<div class="text-center py-20 glass rounded-[2rem] font-black text-slate-400">СУДАЛСАН ҮГ БАЙХГҮЙ</div>`; return; }
        el.innerHTML = `<div class="grid gap-4 mb-10">${favorites.map(v => `
            <div class="glass p-6 flex items-center justify-between border-l-4 border-green-500">
                <div><h3 class="text-xl font-black text-slate-800">${v.nsf}</h3><p class="text-sm font-bold text-slate-600">${v.mn}</p></div>
                <button onclick="toggleLearned(${v.id})" class="p-3 bg-red-50 text-red-500 rounded-full hover:bg-red-100"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
            </div>`).join('')}</div>`;
    }

    window.onload = () => { setTab('dict'); };
</script>
</body>
</html>
