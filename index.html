        .school-font { font-family: 'Oswald', sans-serif; letter-spacing: 0.03em; }

            height: 130px;

            justify-content: center;

            max-height: 100%;

        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }

        if (learnedIds.has(id)) learnedIds.delete(id);

        Response MUST be in JSON format with exactly this structure:
        {
          "present": {"я": "", "ты": "", "он/она": "", "мы": "", "вы": "", "они": ""},
          "past": {"м.р.": "", "ж.р.": "", "ср.р.": "", "мн.ч.": ""},
          "future": {"я": "", "ты": "", "он/она": "", "мы": "", "вы": "", "они": ""},
          "imperative": {"ед.ч.": "", "мн.ч.": ""},
          "translation": "Mongolian translation",
          "upr": "Question like (кого? что?) if known, otherwise empty string"
        }`;
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            const data = await response.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);
        } catch (error) {
            console.error(error);
            return null;
        }
    }

    function render() {
        const container = document.getElementById('content');
        container.innerHTML = '';
        
        if (currentTab === 'dict') renderDictionary(container);
        else if (currentTab === 'favorites') renderFavorites(container);
        else if (currentTab === 'conjugation') renderConjugation(container);
        else if (currentTab === 'practice') {
            if (!gameMode) renderPracticeMenu(container);
            else if (gameMode === 'quiz') renderQuiz(container);
            else if (gameMode === 'miner') renderMiner(container);
            else if (gameMode === 'listen') renderListen(container);
            else if (gameMode === 'scrambled') renderScrambled(container);
        }
    }

        loading.classList.add('hidden');
        
        if(!data) {
            showFeedback("Алдаа гарлаа. Дахин оролдоно уу.", "error");
            return;
        }

        // Check if the verb exists in our 100 verbs list to get audio and stored upr
        const baseVerb = verbs.find(v => v.pair.toLowerCase().includes(val.toLowerCase()) || v.raw.toLowerCase() === val.toLowerCase());
        const displayUpr = baseVerb ? baseVerb.upr : (data.upr || "");

            </button>

                <div>
                    <div class="flex items-center gap-3">

                        <div class="text-xl font-bold text-red-500 italic">${displayUpr}</div>
                    </div>
                    <div class="text-slate-500 font-bold mt-1 text-lg">${data.translation}</div>

                        <span class="w-2 h-2 rounded-full bg-blue-500"></span> Одоо цаг (Настоящее)
                    </h4>
                    <table class="w-full text-sm conjugation-table">
                        ${Object.entries(data.present).map(([person, form]) => `
                            <tr><th class="w-24">${person}</th><td class="font-bold text-slate-700">${form}</td></tr>
                        `).join('')}
                    </table>
                </div>

                <div class="glass p-4 rounded-2xl border-t-2 border-green-200">

                    </h4>
                    <table class="w-full text-sm conjugation-table">
                        ${Object.entries(data.past).map(([gender, form]) => `
                            <tr><th class="w-24">${gender}</th><td class="font-bold text-slate-700">${form}</td></tr>
                        `).join('')}
                    </table>
                </div>

                <div class="glass p-4 rounded-2xl border-t-2 border-purple-200">

        if(ans === gameState.shuffled[gameState.index].mn) {
            gameState.score++;

        } else {
            showFeedback("АНХААРААРАЙ, БУРУУ БАЙНА", "error");

        setTimeout(() => {
            gameState.index++;
            if(gameState.index < 10) render();
            else renderResult();

        const targetWord = item.raw.toUpperCase().replace(/[А́Е́И́О́У́Ы́Э́Ю́Я́]/g, (m) => m[0]);

                <span class="text-xs font-bold text-red-500 italic mb-8 block">${item.upr}</span>
                <div class="flex flex-wrap justify-center gap-2 mb-10">
                    ${targetWord.split('').map((char, i) => `
                        <div class="letter-slot ${gameState.minerRevealed.has(i) ? 'correct' : ''}">
                            ${gameState.minerRevealed.has(i) ? char : ''}
                        </div>
                    `).join('')}
                </div>
                <div class="grid grid-cols-7 sm:grid-cols-9 gap-2 max-w-lg mx-auto bg-slate-50/50 p-4 rounded-2xl">
                    ${"АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ".split('').map(char => `

    function guessLetter(char, target) {
        let found = false;
        target.split('').forEach((c, i) => {
            if(c === char) {
                gameState.minerRevealed.add(i);
                found = true;
            }
        });

        if(gameState.minerRevealed.size === target.length) {
            gameState.score++;
            showFeedback("ОЛБОРЛОЛТ АМЖИЛТТАЙ!", "success");
            setTimeout(() => {
                gameState.index++;
                gameState.minerRevealed = null;
                if(gameState.index < 10) render();
                else renderResult();
            }, 800);
        } else {
            render();
        }
    }

        const item = gameState.shuffled[gameState.index];

    function checkListen() {
        const inputEl = document.getElementById('listenInput');
        if(!inputEl) return;
        const val = inputEl.value.trim().toUpperCase();
        const item = gameState.shuffled[gameState.index];
        const rawWord = item.raw.toUpperCase().replace(/[А́Е́И́О́У́Ы́Э́Ю́Я́]/g, (m) => m[0]);
        
        if(val === rawWord) {
            gameState.score++;
            showFeedback("МАШ САЙН БАЙЛАА!", "success");
        } else {
            showFeedback(`БУРУУ! Зөв нь: ${rawWord}`, "error");
            inputEl.classList.add('shake');
        }
        setTimeout(() => {
            gameState.index++;
            if(gameState.index < 10) render();
            else renderResult();
        }, 1500);
    }

                    `).join('')}
                </div>
                <input type="text" id="guessInput" placeholder="Үгээ бичээрэй..." autocomplete="off" class="w-full p-6 rounded-2xl border-2 border-slate-100 text-center text-3xl font-black uppercase mb-8 focus:border-red-500 outline-none transition-all shadow-inner bg-slate-50/30" onkeyup="if(event.key==='Enter') checkScrambled()">
                <button onclick="checkScrambled()" class="w-full py-5 bg-slate-800 text-white rounded-2xl font-bold text-xl hover:bg-black transition-all shadow-xl">ШАЛГАХ</button>
                <button onclick="setTab('practice')" class="mt-10 text-slate-400 font-bold hover:text-red-500 text-xs tracking-widest uppercase">Зогсоох</button>
            </div>
        `;
        setTimeout(() => document.getElementById('guessInput').focus(), 200);
    }

    function checkScrambled() {
        const val = document.getElementById('guessInput').value.trim().toUpperCase();
        const item = gameState.shuffled[gameState.index];
        const rawWord = item.raw.toUpperCase().replace(/[А́Е́И́О́У́Ы́Э́Ю́Я́]/g, (m) => m[0]);
        
        if(val === rawWord) {
            gameState.score++;
            showFeedback("ЗӨВ ЭВЛҮҮЛЛЭЭ!", "success");
        } else {
            showFeedback(`БУРУУ! Зөв нь: ${rawWord}`, "error");
        }
        
        setTimeout(() => {
            gameState.index++;
            gameState.scrambledWord = null;
            if(gameState.index < 10) render();
            else renderResult();
        }, 1200);
    }

    function renderResult() {
        const container = document.getElementById('content');
        const percentage = (gameState.score / 10) * 100;
        let rank = "ХИЧЭЭХ ХЭРЭГТЭЙ";
        let emoji = "📚";
        
        if(percentage >= 90) { rank = "МАШ САЙН!"; emoji = "🏆"; }
        else if(percentage >= 70) { rank = "САЙН БАЙНА"; emoji = "⭐"; }

        container.innerHTML = `
            <div class="max-w-md mx-auto glass p-12 rounded-4xl text-center shadow-2xl border-t-8 border-yellow-400 transform animate-in fade-in zoom-in duration-500">
                <div class="text-8xl mb-6">${emoji}</div>
                <h2 class="text-4xl font-black text-slate-800 mb-2">${rank}</h2>
                <div class="my-10">
                    <p class="text-slate-400 text-sm uppercase font-bold tracking-widest mb-2">Таны оноо</p>
                    <div class="text-6xl font-black text-blue-900">${gameState.score} <span class="text-slate-300 text-3xl">/ 10</span></div>
                </div>
                <button onclick="setTab('practice')" class="w-full py-5 bg-blue-900 text-white rounded-2xl font-bold text-xl shadow-2xl hover:bg-black transition-all transform hover:scale-105 active:scale-95">ДАХИН ЭХЛЭХ</button>
            </div>
        `;
    }

    function renderFavorites(el) {
        const favVerbs = verbs.filter(v => learnedIds.has(v.id));
        if (favVerbs.length === 0) {
            el.innerHTML = `
                <div class="text-center p-20 glass rounded-3xl text-slate-400">
                    <div class="text-5xl mb-4 opacity-30">📂</div>
                    <div class="font-bold italic">Одоогоор цээжилсэн үг байхгүй байна.</div>
                </div>`;
            return;
        }
        el.innerHTML = `
            <div class="flex justify-between items-center mb-8 px-4">
                <h2 class="text-xl font-bold text-slate-800">Миний цээжилсэн үгс (${favVerbs.length})</h2>
                <span class="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full font-bold">ЦЭЭЖИЛСЭН</span>
            </div>
        `;
        const list = document.createElement('div');
        list.className = 'grid grid-cols-1 md:grid-cols-2 gap-4';
        favVerbs.forEach(v => {
            list.innerHTML += `
                <div class="verb-card glass p-5 rounded-2xl flex justify-between items-center border-l-green-500 shadow-sm transition-all hover:-translate-y-1">
                    <div>
                        <div class="flex items-center gap-2">
                            <div class="text-blue-900 font-black text-lg">${v.pair}</div>
                            <span class="text-xs font-bold text-red-500 italic">${v.upr}</span>
                        </div>
                        <div class="text-slate-600 font-medium text-sm mt-1">${v.mn}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="playAudio(${v.id})" class="p-3 rounded-xl bg-blue-50 text-blue-600 hover:bg-blue-100 transition-colors">
                             <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"></path></svg>
                        </button>
                        <button onclick="toggleLearned(${v.id})" class="p-3 rounded-xl bg-red-50 text-red-400 hover:bg-red-500 hover:text-white transition-all shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                </div>
            `;
        });
        el.appendChild(list);
    }

    function showFeedback(msg, type) {
        const feedback = document.createElement('div');
        feedback.className = `fixed top-10 left-1/2 transform -translate-x-1/2 p-5 rounded-2xl text-white font-bold shadow-2xl z-50 transition-all duration-300 flex items-center gap-3 animate-in fade-in slide-in-from-top-4 ${type==='success' ? 'bg-green-600' : 'bg-red-600'}`;
        feedback.innerHTML = `
            <span>${type === 'success' ? '✔' : '✖'}</span>
            <span>${msg}</span>
        `;
        document.body.appendChild(feedback);
        setTimeout(() => {
            feedback.style.opacity = '0';
            feedback.style.transform = 'translate(-50%, -20px)';
            setTimeout(() => feedback.remove(), 400);
        }, 2000);
    }

    window.onload = () => {
        setTab('dict');
    };
</script>

</body>
</html>
